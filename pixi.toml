# ---- Tasks ------------------------------------------------------------------
#
# Build flow (shared across OSes, dispatched by configure-release/etc.):
#   apply-branding -> initialize -> configure-release -> build-release -> install-release
#
# Per-OS configure tasks live below; everything else is OS-agnostic and runs
# from the engine/ directory so engine/CMakePresets.json works as-is.

[tasks]
initialize = { cmd = ["git", "submodule", "update", "--init", "--recursive"], cwd = "engine" }
apply-branding = { cmd = ["bash", "branding/apply-branding.sh"] }
build-release = { cmd = ["cmake", "--build", "build/release", "--config", "Release"], cwd = "engine" }
install-release = { cmd = ["cmake", "--install", "build/release", "--config", "Release"], cwd = "engine", depends-on = ["build-release"] }

# Top-level convenience: configure + build + install in one shot.
linuxcad-release = [
    { task = "apply-branding" },
    { task = "configure-release" },
    { task = "build-release" },
    { task = "install-release" },
]
linuxcad = [{ task = "linuxcad-release" }]

# Packaging — picks the right task for the current OS via target.<os>.tasks below.
package = [{ task = "package-os" }]

# Launch the just-installed LinuxCAD (resolves to OS-specific binary).
launch = [{ task = "launch-os" }]

[target.linux-64.tasks]
configure-release = { cmd = [
    "cmake", "--preset", "conda-linux-release",
    "-DPACKAGE_NAME=LinuxCAD",
    "-DPACKAGE_VERSION_SUFFIX=-linuxcad",
], cwd = "engine", depends-on = ["initialize", "apply-branding"], env = { CFLAGS = "", CXXFLAGS = "", DEBUG_CFLAGS = "", DEBUG_CXXFLAGS = "" } }
package-os = { cmd = ["bash", "packaging/linux/build-appimage.sh"], depends-on = ["install-release"] }
launch-os = { cmd = [".pixi/envs/default/bin/FreeCAD"], depends-on = ["install-release"] }

[target.linux-aarch64.tasks]
configure-release = { cmd = [
    "cmake", "--preset", "conda-linux-release",
    "-DPACKAGE_NAME=LinuxCAD",
    "-DPACKAGE_VERSION_SUFFIX=-linuxcad",
], cwd = "engine", depends-on = ["initialize", "apply-branding"], env = { CFLAGS = "", CXXFLAGS = "", DEBUG_CFLAGS = "", DEBUG_CXXFLAGS = "" } }
package-os = { cmd = ["bash", "packaging/linux/build-appimage.sh"], depends-on = ["install-release"] }
launch-os = { cmd = [".pixi/envs/default/bin/FreeCAD"], depends-on = ["install-release"] }

[target.osx-64.tasks]
configure-release = { cmd = [
    "cmake", "--preset", "conda-macos-release",
    "-DPACKAGE_NAME=LinuxCAD",
    "-DPACKAGE_VERSION_SUFFIX=-linuxcad",
], cwd = "engine", depends-on = ["initialize", "apply-branding"], env = { CFLAGS = "", CXXFLAGS = "", DEBUG_CFLAGS = "", DEBUG_CXXFLAGS = "" } }
package-os = { cmd = ["bash", "packaging/macos/build-dmg.sh"], depends-on = ["install-release"] }
launch-os = { cmd = [".pixi/envs/default/bin/FreeCAD"], depends-on = ["install-release"] }

[target.osx-arm64.tasks]
configure-release = { cmd = [
    "cmake", "--preset", "conda-macos-release",
    "-DPACKAGE_NAME=LinuxCAD",
    "-DPACKAGE_VERSION_SUFFIX=-linuxcad",
], cwd = "engine", depends-on = ["initialize", "apply-branding"], env = { CFLAGS = "", CXXFLAGS = "", DEBUG_CFLAGS = "", DEBUG_CXXFLAGS = "" } }
package-os = { cmd = ["bash", "packaging/macos/build-dmg.sh"], depends-on = ["install-release"] }
launch-os = { cmd = [".pixi/envs/default/bin/FreeCAD"], depends-on = ["install-release"] }

[target.win-64.tasks]
configure-release = { cmd = [
    "cmake", "--preset", "conda-windows-release",
    "-DCMAKE_GENERATOR_PLATFORM=", "-DCMAKE_GENERATOR_TOOLSET=",
    "-DPACKAGE_NAME=LinuxCAD",
    "-DPACKAGE_VERSION_SUFFIX=-linuxcad",
], cwd = "engine", depends-on = ["initialize", "apply-branding"], env = { CFLAGS = "", CXXFLAGS = "", DEBUG_CFLAGS = "", DEBUG_CXXFLAGS = "" } }
package-os = { cmd = ["pwsh", "-NoProfile", "-File", "packaging/windows/build-zip.ps1"], depends-on = ["install-release"] }
launch-os = { cmd = [".pixi/envs/default/Library/bin/FreeCAD.exe"], depends-on = ["install-release"] }
