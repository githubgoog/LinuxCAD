# LinuxCAD top-level pixi manifest.
#
# Single recipe. Same conda-forge packages on Linux, macOS, and Windows.
# This intentionally mirrors engine/pixi.toml's dependency set (which is the
# upstream FreeCAD recipe) so the root environment can configure, build,
# install, and package the engine without dirtying the vendored source.
#
# Common tasks:
#   pixi run linuxcad-release       # build + install LinuxCAD
#   pixi run package                # produce the OS-native artifact
#   pixi run launch                 # run the just-built LinuxCAD
#
# CI calls these directly. Local devs can do the same thing.

[workspace]
name = "LinuxCAD"
version = "1.0.0"
description = "Friendly CAD desktop app, built on the FreeCAD engine"
authors = ["LinuxCAD contributors"]
channels = ["freecad", "conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
requires-pixi = ">=0.48"

# Mirrors engine/pixi.toml. Update these together when the engine is rebased.
