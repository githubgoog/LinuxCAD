name: Release Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.product }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: LinuxCAD-for-Linux
            os: ubuntu-24.04
            shell: bash
            arch: x86_64
            package_task: package
          - product: LinuxCAD-for-macOS-arm64
            os: macos-14
            shell: bash
            arch: arm64
            package_task: package
          - product: LinuxCAD-for-macOS-x86_64
            os: macos-13
            shell: bash
            arch: x86_64
            package_task: package
          - product: LinuxCAD-for-Windows
            os: windows-2022
            shell: pwsh
            arch: x64
            package_task: package

    env:
      LINUXCAD_VERSION: ${{ github.ref_name }}
      LINUXCAD_ARCH: ${{ matrix.arch }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.59.0
          cache: true
          cache-write: ${{ github.event_name != 'pull_request' }}

      - name: Install AppImage tooling (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file desktop-file-utils libfuse2
          mkdir -p "$HOME/.local/bin"
          curl -fL -o "$HOME/.local/bin/linuxdeploy" \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage"
          curl -fL -o "$HOME/.local/bin/linuxdeploy-plugin-qt" \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage"
          curl -fL -o "$HOME/.local/bin/appimagetool" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          chmod +x "$HOME/.local/bin/linuxdeploy" "$HOME/.local/bin/linuxdeploy-plugin-qt" "$HOME/.local/bin/appimagetool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # AppImages need libfuse2 to self-mount; on GH runners we extract instead.
          for f in linuxdeploy linuxdeploy-plugin-qt appimagetool; do
            echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"
          done

      - name: Build LinuxCAD (pixi)
        run: pixi run linuxcad-release

      - name: Package LinuxCAD
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: pixi run ${{ matrix.package_task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}
          path: |
            dist/LinuxCAD-for-Linux-*.AppImage
            dist/LinuxCAD-for-macOS-*.dmg
            dist/LinuxCAD-for-Windows-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f \( \
              -name 'LinuxCAD-for-Linux-*.AppImage' \
              -o -name 'LinuxCAD-for-macOS-*.dmg' \
              -o -name 'LinuxCAD-for-Windows-*.zip' \
            \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate latest.json manifest
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import datetime, json, os, re, pathlib

          tag = os.environ["RELEASE_TAG"]
          version = tag.removeprefix("v")
          base = f"https://github.com/{os.environ['REPO']}/releases/download/{tag}"
          assets = sorted(p.name for p in pathlib.Path("release-assets").iterdir() if p.is_file())

          def first(pattern):
              rx = re.compile(pattern)
              for n in assets:
                  if rx.search(n):
                      return n
              return None

          manifest = {
              "version": version,
              "tag": tag,
              "_generated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "products": {},
          }

          mapping = [
              ("linux_x86_64",  r"^LinuxCAD-for-Linux-.*-x86_64\.AppImage$",      "LinuxCAD for Linux (x86_64)"),
              ("linux_aarch64", r"^LinuxCAD-for-Linux-.*-aarch64\.AppImage$",     "LinuxCAD for Linux (aarch64)"),
              ("macos_arm64",   r"^LinuxCAD-for-macOS-.*-arm64\.dmg$",            "LinuxCAD for macOS (Apple Silicon)"),
              ("macos_x86_64",  r"^LinuxCAD-for-macOS-.*-x86_64\.dmg$",           "LinuxCAD for macOS (Intel)"),
              ("windows_x64",   r"^LinuxCAD-for-Windows-.*-x64\.zip$",            "LinuxCAD for Windows (x64)"),
          ]
          for key, pattern, label in mapping:
              name = first(pattern)
              if name:
                  manifest[key] = f"{base}/{name}"
                  manifest["products"][key] = {"label": label, "url": f"{base}/{name}", "asset": name}

          out = pathlib.Path("release-assets/latest.json")
          out.write_text(json.dumps(manifest, indent=2) + "\n")
          print(out.read_text())
          PY

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          make_latest: true
          files: release-assets/*
