name: Release Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.product }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: LinuxCAD-for-Linux
            os: ubuntu-24.04
            shell: bash
            arch: x86_64
            package_task: package
          - product: LinuxCAD-for-macOS-arm64
            os: macos-14
            shell: bash
            arch: arm64
            package_task: package
          # macOS-x86_64 (macos-13) was dropped after v1.1.4: GitHub-hosted Intel
          # Mac runners are scarce on free-tier accounts and routinely sit in queue
          # for 19+ hours, blocking the publish job. Apple has EOL'd Intel Macs.
          # If you specifically need an Intel Mac build, reintroduce this entry
          # and accept the queue-time risk.
          - product: LinuxCAD-for-Windows
            os: windows-2022
            shell: pwsh
            arch: x64
            package_task: package

    env:
      # On tag pushes github.ref_name is the tag (e.g. "v1.1.4"). On
      # workflow_dispatch against a branch it'd be the branch name with slashes,
      # which broke the AppImage/DMG output filename. Honour inputs.tag when
      # dispatched.
      LINUXCAD_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      LINUXCAD_ARCH: ${{ matrix.arch }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.59.0
          cache: false

      - name: Install AppImage tooling (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file desktop-file-utils libfuse2
          mkdir -p "$HOME/.local/bin"
          curl -fL -o "$HOME/.local/bin/linuxdeploy" \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage"
          curl -fL -o "$HOME/.local/bin/linuxdeploy-plugin-qt" \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage"
          curl -fL -o "$HOME/.local/bin/appimagetool" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          chmod +x "$HOME/.local/bin/linuxdeploy" "$HOME/.local/bin/linuxdeploy-plugin-qt" "$HOME/.local/bin/appimagetool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # AppImages need libfuse2 to self-mount; on GH runners we extract instead.
          for f in linuxdeploy linuxdeploy-plugin-qt appimagetool; do
            echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"
          done

      - name: Build LinuxCAD (pixi)
        run: pixi run linuxcad-release

      - name: Package LinuxCAD
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: pixi run ${{ matrix.package_task }}

      # Windows-specific runtime smoke test. The previous build-zip.ps1 only
      # staged the conda Library/ subtree, missing the Python interpreter and
      # Lib/site-packages — so the zip would extract cleanly but FreeCAD would
      # fail to import Python at startup. Verify by running FreeCADCmd against
      # the freshly built zip; if Python isn't wired correctly, the workflow
      # fails before publishing.
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = Get-ChildItem -Path dist -Filter "LinuxCAD-for-Windows-*.zip" -File | Select-Object -First 1
          if (-not $zip) { throw "No Windows zip found in dist/" }
          $extract = Join-Path $env:RUNNER_TEMP "linuxcad-smoke"
          if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
          Expand-Archive -Path $zip.FullName -DestinationPath $extract
          $exe = Join-Path $extract "bin/FreeCADCmd.exe"
          if (-not (Test-Path $exe)) { throw "FreeCADCmd.exe missing from staged zip at $exe" }
          Write-Host "Running $exe -c 'import sys; print(...)'"
          $output = & $exe -c "import sys; print('SMOKE_OK_PYTHON', sys.version)" 2>&1 | Out-String
          Write-Host "FreeCADCmd output:`n$output"
          if ($LASTEXITCODE -ne 0) {
              throw "FreeCADCmd exited $LASTEXITCODE during smoke test"
          }
          if ($output -notmatch "SMOKE_OK_PYTHON") {
              throw "Smoke test output missing SMOKE_OK_PYTHON marker; Python not wired correctly"
          }

      - name: Upload artifact
        # Upload even on smoke-test failure so we can inspect what was built.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}
          path: |
            dist/LinuxCAD-for-Linux-*.AppImage
            dist/LinuxCAD-for-macOS-*.dmg
            dist/LinuxCAD-for-Windows-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f \( \
              -name 'LinuxCAD-for-Linux-*.AppImage' \
              -o -name 'LinuxCAD-for-macOS-*.dmg' \
              -o -name 'LinuxCAD-for-Windows-*.zip' \
            \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate latest.json manifest
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import datetime, json, os, re, pathlib

          tag = os.environ["RELEASE_TAG"]
          version = tag.removeprefix("v")
          base = f"https://github.com/{os.environ['REPO']}/releases/download/{tag}"
          assets = sorted(p.name for p in pathlib.Path("release-assets").iterdir() if p.is_file())

          def first(pattern):
              rx = re.compile(pattern)
              for n in assets:
                  if rx.search(n):
                      return n
              return None

          manifest = {
              "version": version,
              "tag": tag,
              "_generated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "products": {},
          }

          mapping = [
              ("linux_x86_64",  r"^LinuxCAD-for-Linux-.*-x86_64\.AppImage$",      "LinuxCAD for Linux (x86_64)"),
              ("linux_aarch64", r"^LinuxCAD-for-Linux-.*-aarch64\.AppImage$",     "LinuxCAD for Linux (aarch64)"),
              ("macos_arm64",   r"^LinuxCAD-for-macOS-.*-arm64\.dmg$",            "LinuxCAD for macOS (Apple Silicon)"),
              # macos_x86_64 intentionally omitted; Intel Mac runners were dropped from the matrix.
              ("windows_x64",   r"^LinuxCAD-for-Windows-.*-x64\.zip$",            "LinuxCAD for Windows (x64)"),
          ]
          for key, pattern, label in mapping:
              name = first(pattern)
              if name:
                  manifest[key] = f"{base}/{name}"
                  manifest["products"][key] = {"label": label, "url": f"{base}/{name}", "asset": name}

          out = pathlib.Path("release-assets/latest.json")
          out.write_text(json.dumps(manifest, indent=2) + "\n")
          print(out.read_text())
          PY

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          make_latest: true
          files: release-assets/*
