name: Release Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04

    env:
      CI: true
      LINUXCAD_VERSION: ${{ github.ref_name }}
      LINUXCAD_BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake ninja-build ccache git swig pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools \
            qt6-webengine-dev libqt6opengl6-dev libqt6openglwidgets6 \
            libxerces-c-dev libboost-all-dev libeigen3-dev \
            libcoin-dev libpcl-dev libgts-dev \
            libocct-foundation-dev libocct-data-exchange-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev libocct-visualization-dev \
            libmedc-dev libvtk9-dev libgmsh-dev libfmt-dev libyaml-cpp-dev \
            libzipios++-dev python3-dev python3-pip python3-matplotlib
      - name: Build & package (Linux)
        if: matrix.name == 'Linux'
        run: |
          chmod +x build/build-linux.sh build/common.sh branding/apply-branding.sh \
                   packaging/linux/build-appimage.sh packaging/linux/build-deb.sh
          ./build/build-linux.sh --install
          ./packaging/linux/build-deb.sh
          ./packaging/linux/build-appimage.sh

      - name: Install macOS deps
        if: matrix.name == 'macOS'
        run: |
          brew update
          brew install cmake ninja ccache qt@6 boost eigen swig coin3d \
                       opencascade xerces-c fmt yaml-cpp pkg-config

      - name: Build & package (macOS)
        if: matrix.name == 'macOS'
        run: |
          chmod +x build/build-mac.sh build/common.sh branding/apply-branding.sh \
                   packaging/macos/build-dmg.sh
          ./build/build-mac.sh --install
          ./packaging/macos/build-dmg.sh

      - name: Cache LibPack (Windows)
        if: matrix.name == 'Windows'
        id: libpack-cache
        uses: actions/cache@v4
        with:
          path: LibPack
          key: linuxcad-libpack-2024.08-${{ runner.os }}

      - name: Download FreeCAD LibPack (Windows)
        if: matrix.name == 'Windows' && steps.libpack-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/FreeCAD/FreeCAD-LibPack/releases/download/2024.08/LibPack-1.1.x-v3.0.0-Release.7z"
          Invoke-WebRequest -Uri $url -OutFile LibPack.7z
          7z x LibPack.7z -oLibPack

      - name: Build & package (Windows)
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          $libpack = (Get-ChildItem -Directory LibPack | Select-Object -First 1).FullName
          pwsh build/build-win.ps1 -Install -LibPack "$libpack"
          choco install nsis -y --no-progress
          pwsh packaging/windows/build-nsis.ps1

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linuxcad-${{ matrix.name }}
          path: |
            build/_packages/**/*.AppImage
            build/_packages/**/*.deb
            build/_packages/**/*.dmg
            build/_packages/**/*.exe
            ~/.cache/linuxcad/**/_packages/**/*.AppImage
            ~/.cache/linuxcad/**/_packages/**/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate latest.json manifest
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import datetime, json, os, re, pathlib

          tag = os.environ["RELEASE_TAG"]
          version = tag.removeprefix("v")
          base = f"https://github.com/{os.environ['REPO']}/releases/download/{tag}"

          assets = sorted(p.name for p in pathlib.Path("release-assets").iterdir() if p.is_file())

          def first(pattern, exclude=()):
              rx = re.compile(pattern)
              for name in assets:
                  if rx.search(name) and not any(e in name for e in exclude):
                      return name
              return None

          manifest = {
              "version": version,
              "tag": tag,
              "_generated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          x86 = first(r"^LinuxCAD-.*-x86_64\.AppImage$") or first(r"^LinuxCAD-.*\.AppImage$", exclude=("aarch64",))
          if x86:
              manifest["linux_x86_64"] = f"{base}/{x86}"
          arm = first(r"^LinuxCAD-.*-aarch64\.AppImage$")
          if arm:
              manifest["linux_aarch64"] = f"{base}/{arm}"
          deb = first(r"\.deb$")
          if deb:
              manifest["linux_deb_amd64"] = f"{base}/{deb}"
          dmg = first(r"\.dmg$")
          if dmg:
              manifest["macos"] = f"{base}/{dmg}"
          exe = first(r"\.exe$")
          if exe:
              manifest["windows"] = f"{base}/{exe}"

          out = pathlib.Path("release-assets/latest.json")
          out.write_text(json.dumps(manifest, indent=2) + "\n")
          print(out.read_text())
          PY

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          make_latest: true
          files: release-assets/*
