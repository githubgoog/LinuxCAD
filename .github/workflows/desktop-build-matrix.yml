name: Desktop Build Matrix

# Per-PR / per-push smoke build. Runs the same pixi recipe used for releases
# but stops at the build/install step (no packaging). One job per OS, all
# pulling pinned conda-forge deps from a single pixi.toml — no apt/brew/LibPack
# needed.

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.product }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: LinuxCAD-for-Linux
            os: ubuntu-24.04
            shell: bash
          - product: LinuxCAD-for-macOS
            os: macos-14
            shell: bash
          - product: LinuxCAD-for-Windows
            os: windows-2022
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.59.0
          cache: true

      - name: Configure & build (no package)
        run: |
          pixi run apply-branding
          pixi run configure-release
          pixi run build-release
