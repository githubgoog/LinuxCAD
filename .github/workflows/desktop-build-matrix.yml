name: Desktop Build Matrix

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            buildScript: electron:build:linux
            artifactPath: |
              frontend/release/*.AppImage
              frontend/release/*.deb
          - name: macOS
            os: macos-latest
            buildScript: electron:build:mac
            artifactPath: |
              frontend/release/*-mac-*.dmg
              frontend/release/*-mac-*.zip
          - name: Windows
            os: windows-latest
            buildScript: electron:build:win
            artifactPath: |
              frontend/release/*-win-*.exe
              frontend/release/*-win-*.zip

    env:
      CI: true
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Rust backend
        working-directory: backend-rust
        run: cargo build --release

      - name: Build desktop package
        working-directory: frontend
        run: npm run ${{ matrix.buildScript }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linuxcad-${{ matrix.name }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: warn
