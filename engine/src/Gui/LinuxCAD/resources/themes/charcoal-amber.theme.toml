[theme]
name        = "Charcoal Amber"
id          = "charcoal-amber"
author      = "LinuxCAD"
description = "Default LinuxCAD theme: charcoal surfaces with amber accent."
font_family = "Inter, Segoe UI, Roboto, Cantarell, Noto Sans, sans-serif"

[colors]
bg_primary      = "#14171C"
bg_secondary    = "#1B1F25"
bg_hover        = "#232830"
border_subtle   = "#2C323B"
border_strong   = "#3A4150"
text_primary    = "#ECEEF1"
text_muted      = "#A8AEB8"
text_dim        = "#6B7280"
accent          = "#F59E0B"
accent_hover    = "#FFB933"
accent_pressed  = "#B36F00"
scrollbar_bg    = "#14171C"
scrollbar_thumb = "#3A4150"
selection_bg    = "#232830"
selection_text  = "#ECEEF1"
ai_idle         = "#F59E0B"
ai_thinking     = "#FFB933"
ai_error        = "#F08080"
ai_disabled     = "#6B7280"

extra_qss = ""
