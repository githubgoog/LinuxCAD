[theme]
name        = "Light Amber"
id          = "light-amber"
author      = "LinuxCAD"
description = "Light counterpart to Charcoal Amber: white surfaces with amber accent."
font_family = "Inter, Segoe UI, Roboto, Cantarell, Noto Sans, sans-serif"

[colors]
bg_primary      = "#FFFFFF"
bg_secondary    = "#F4F6F8"
bg_hover        = "#E8EBEF"
border_subtle   = "#DCE0E5"
border_strong   = "#C5CCD6"
text_primary    = "#1A1F26"
text_muted      = "#4B5563"
text_dim        = "#9AA3AF"
accent          = "#F59E0B"
accent_hover    = "#FFB933"
accent_pressed  = "#B36F00"
scrollbar_bg    = "#FAFBFC"
scrollbar_thumb = "#C5CCD6"
selection_bg    = "#FFE7B5"
selection_text  = "#1A1F26"
ai_idle         = "#B36F00"
ai_thinking     = "#F59E0B"
ai_error        = "#B14747"
ai_disabled     = "#9AA3AF"

extra_qss = ""
