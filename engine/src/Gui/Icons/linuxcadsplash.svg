<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="568" height="368" viewBox="0 0 568 368" fill="none">
  <defs>
    <linearGradient id="splashBg" x1="0" y1="0" x2="568" y2="368" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0E12"/>
      <stop offset="0.45" stop-color="#12171E"/>
      <stop offset="1" stop-color="#1A222C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="568" height="368" fill="url(#splashBg)"/>
  <!-- subtle engineering grid -->
  <g opacity="0.06" stroke="#ECEEF1" stroke-width="0.5">
    <path d="M0 92 H568 M0 184 H568 M0 276 H568"/>
    <path d="M142 0 V368 M284 0 V368 M426 0 V368"/>
  </g>
  <!-- Isometric keycap + amber corner accent (LinuxCAD mark) -->
  <g transform="translate(142 42) scale(2.15)">
    <g stroke="#3D4A5C" stroke-width="0.85" stroke-linejoin="round">
      <path fill="#1B2028" d="M46 23 L52 32 L37 44 L35.5 28 Z"/>
      <path fill="#232A33" d="M18 23 L12 32 L27 44 L28.5 28 Z"/>
      <path fill="#343D4A" d="M32 16 L46 23 L35.5 28 L28.5 28 L18 23 Z"/>
      <!-- Amber wrap on front-right corner -->
      <path fill="#F59E0B" stroke="#C97903" stroke-width="0.55"
            d="M35.5 28 L37 33 L34 36 L32 31.5 Z M37 33 L40 30.5 L38.5 27.2 L35.5 28 Z"/>
      <path fill="#FFB84D" opacity="0.9" d="M35.5 28 L32 30.2 L28.5 28 Z"/>
    </g>
    <!-- L facet on cap -->
    <path fill="none" stroke="#ECEEF1" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"
          opacity="0.92"
          d="M24 26 L24 31 L30 31"/>
  </g>
  <!-- Wordmark -->
  <text x="284" y="298" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#ECEEF1">LinuxCAD</text>
  <text x="284" y="326" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="500" fill="#7D8794">CAD for Linux - precise, open, yours.</text>
  <!-- Bottom band for build version text (drawn by app) -->
  <rect x="0" y="332" width="568" height="36" fill="#0B0E12" opacity="0.72"/>
