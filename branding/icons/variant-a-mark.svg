<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <title>LinuxCAD - Variant A: Drafting L</title>

  <!-- Drafting square L body: charcoal with subtle 1px outer stroke -->
  <path d="M 88 48 L 120 48 L 120 176 L 224 176 L 224 208 L 88 208 Z"
        fill="#1B1F25" stroke="#3A4150" stroke-width="2" stroke-linejoin="miter" />

  <!-- Inner highlight along the inside corner -->
  <path d="M 120 48 L 120 176 L 224 176"
        stroke="#2C323B" stroke-width="1" fill="none" />

  <!-- Amber chamfer at the inner right-angle corner (signature accent) -->
  <path d="M 120 152 L 144 176 L 120 176 Z"
        fill="#F59E0B" />

  <!-- Outer-edge ruler tick marks: short on left, long every 5th -->
  <g stroke="#3A4150" stroke-width="1.5" stroke-linecap="square">
    <!-- Left edge ticks (project leftward) -->
    <line x1="80" y1="64"  x2="88" y2="64"  />
    <line x1="76" y1="80"  x2="88" y2="80"  />
    <line x1="80" y1="96"  x2="88" y2="96"  />
    <line x1="80" y1="112" x2="88" y2="112" />
    <line x1="76" y1="128" x2="88" y2="128" />
    <line x1="80" y1="144" x2="88" y2="144" />
    <line x1="80" y1="160" x2="88" y2="160" />
    <line x1="76" y1="176" x2="88" y2="176" />
    <!-- Bottom edge ticks (project downward) -->
    <line x1="112" y1="208" x2="112" y2="220" />
    <line x1="128" y1="208" x2="128" y2="216" />
    <line x1="144" y1="208" x2="144" y2="216" />
    <line x1="160" y1="208" x2="160" y2="220" />
    <line x1="176" y1="208" x2="176" y2="216" />
    <line x1="192" y1="208" x2="192" y2="216" />
    <line x1="208" y1="208" x2="208" y2="220" />
  </g>
</svg>
