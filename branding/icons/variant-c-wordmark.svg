<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="80" viewBox="0 0 420 80" fill="none">
  <title>LinuxCAD wordmark - Variant C (Drafting L + compass-arc C)</title>

  <!-- Drafting L mark -->
  <g transform="translate(12 12)">
    <path d="M 12 4 L 22 4 L 22 42 L 52 42 L 52 52 L 12 52 Z"
          fill="#1B1F25" stroke="#3A4150" stroke-width="1.5" stroke-linejoin="miter" />
    <path d="M 22 36 L 28 42 L 22 42 Z" fill="#F59E0B" />
  </g>

  <!-- "Linux" -->
  <text x="84" y="58"
        font-family="Inter, 'Segoe UI', Roboto, 'Cantarell', 'Noto Sans', sans-serif"
        font-size="40" font-weight="700"
        letter-spacing="-0.02em"
        fill="#ECEEF1">Linux</text>

  <!-- Custom compass-arc C -->
  <g transform="translate(208 20)">
    <path d="M 36 6 A 20 20 0 1 0 36 34"
          stroke="#ECEEF1" stroke-width="6.5" stroke-linecap="round" fill="none" />
    <circle cx="20" cy="20" r="3.2" fill="#F59E0B" />
  </g>

  <!-- "AD" -->
  <text x="258" y="58"
        font-family="Inter, 'Segoe UI', Roboto, 'Cantarell', 'Noto Sans', sans-serif"
        font-size="40" font-weight="700"
        letter-spacing="-0.02em"
        fill="#ECEEF1">AD</text>
</svg>
